<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>SmartSeason | Field Monitoring & Agricultural Data</title>
    <meta name="description" content="Digital platform for agricultural data, farmer management, and field tracking for agribusinesses." />
    <meta name="author" content="Your Name" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
      /* Splash screen styles to show while React is loading */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: #f9fafb; /* Light gray background */
      }

      #loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        background: white;
        z-index: 9999;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #10b981; /* Shamba-green / Primary 500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 600;
        color: #6b7280;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Hide loader once root is populated */
      #root:not(:empty) + #loader-wrapper {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="loader-wrapper">
      <div class="spinner"></div>
      <p class="loading-text">Initializing SmartSeason...</p>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
